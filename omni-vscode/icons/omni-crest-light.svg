<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background for editor but keeping the Singularity Black inside -->
  <rect width="256" height="256" rx="64" fill="#e2e8f0"/>
  
  <circle cx="128" cy="128" r="90" fill="#0b0f19" stroke="url(#cyan_red_grad)" stroke-width="6" stroke-dasharray="10 6"/>
  <circle cx="128" cy="128" r="70" fill="#000000"/>

  <path d="M 64 128 L 96 96 L 160 160 L 192 128 L 160 96 L 96 160 Z" stroke="url(#cyan_red_grad)" stroke-width="14" stroke-linejoin="miter" fill="none"/>
  
  <circle cx="64" cy="128" r="8" fill="#00ffff"/>
  <circle cx="192" cy="128" r="8" fill="#dc143c"/>
  
  <defs>
    <linearGradient id="cyan_red_grad" x1="30" y1="30" x2="226" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/> <!-- Cyan/Blue -->
      <stop offset="50%" stop-color="#8a2be2"/> <!-- Blend -->
