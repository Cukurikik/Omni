# ==========================================
# 🪐 OMNI FRAMEWORK — CI Pipeline
# ==========================================
# Validates the OMNI Framework codebase
# ==========================================

name: OMNI Framework CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  validate:
    name: Validate OMNI Codebase
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: api/go.sum

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Validate Go API
        working-directory: api
        run: |
          go mod download
          go vet ./...
        continue-on-error: true

      - name: 🏗️ Build Go API
        working-directory: api
        run: |
          CGO_ENABLED=0 go build -o /dev/null ./...
        continue-on-error: true

      - name: ✅ OMNI Validation Complete
        run: echo "🪐 OMNI Framework CI passed"
