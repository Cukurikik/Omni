version: '3.8'

services:
  omni-app:
    build: .
    container_name: omni-framework
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    volumes:
      - omni-cache:/root/release/omni_cache
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  omni-cache:
    driver: local
