[package]
name        = "omni-velocity-js"
version     = "1.0.0"
authors     = ["OMNI Core Team <core@omniframework.dev>"]
description = "Velocity.js animation engine with spring physics"
license     = "OMNI-Community"
homepage    = "https://omniframework.dev/packages/omni-velocity-js"
repository  = "https://github.com/omni-framework/omni-velocity-js"
keywords    = ["animation", "ui", "visual", "rendering"]
edition     = "omni-2025"
tier        = "free"
price_usd   = 0

[dependencies]
omni-std = "^2.0"

[dev-dependencies]
omni-test = "^1.0"
omni-bench-suite = "^1.0"

[permissions]
allow_net    = []
allow_fs     = ["/tmp/omni-anim/"]
allow_env    = ["OMNI_ENV", "OMNI_LOG_LEVEL"]
allow_thread = true

[build]
target       = ["wasm32", "x86_64-linux", "x86_64-windows", "aarch64-apple"]
optimize     = "release"
llvm_passes  = ["vectorize", "inline", "unroll"]

[publish]
registry = "https://nexus.omniframework.dev"