[package]
name        = "omni-bcrypt-native"
version     = "1.0.0"
authors     = ["OMNI Core Team <core@omniframework.dev>"]
description = "Bcrypt password hashing, adaptive cost, timing-safe"
license     = "OMNI-Community"
homepage    = "https://omniframework.dev/packages/omni-bcrypt-native"
repository  = "https://github.com/omni-framework/omni-bcrypt-native"
keywords    = ["utility", "core", "infrastructure", "tool"]
edition     = "omni-2025"
tier        = "free"
price_usd   = 0

[dependencies]
omni-std = "^2.0"
omni-crypto = "^2.0"

[dev-dependencies]
omni-test = "^1.0"
omni-bench-suite = "^1.0"

[permissions]
allow_net    = ["*"]
allow_fs     = ["/tmp/omni-util/"]
allow_env    = ["OMNI_ENV", "OMNI_LOG_LEVEL"]
allow_thread = true

[build]
target       = ["wasm32", "x86_64-linux", "x86_64-windows", "aarch64-apple"]
optimize     = "release"
llvm_passes  = ["vectorize", "inline", "unroll"]

[publish]
registry = "https://nexus.omniframework.dev"