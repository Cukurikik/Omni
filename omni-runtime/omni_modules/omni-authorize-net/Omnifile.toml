[package]
name        = "omni-authorize-net"
version     = "1.0.0"
authors     = ["OMNI Core Team <core@omniframework.dev>"]
description = "Authorize.Net payment for credit cards, ACH, fraud detection"
license     = "OMNI-Community"
homepage    = "https://omniframework.dev/packages/omni-authorize-net"
repository  = "https://github.com/omni-framework/omni-authorize-net"
keywords    = ["payment", "finance", "transaction", "gateway"]
edition     = "omni-2025"
tier        = "free"
price_usd   = 0

[dependencies]
omni-std = "^2.0"
omni-net = "^2.0"
omni-crypto-tls = "^2.0"
omni-xml = "^2.0"

[dev-dependencies]
omni-test = "^1.0"
omni-bench-suite = "^1.0"

[permissions]
allow_net    = ["*"]
allow_fs     = ["/tmp/omni-pay/"]
allow_env    = ["OMNI_ENV", "OMNI_LOG_LEVEL"]
allow_thread = true

[build]
target       = ["wasm32", "x86_64-linux", "x86_64-windows", "aarch64-apple"]
optimize     = "release"
llvm_passes  = ["vectorize", "inline", "unroll"]

[publish]
registry = "https://nexus.omniframework.dev"